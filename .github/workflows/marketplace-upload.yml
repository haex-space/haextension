name: Marketplace Upload

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension name'
        required: true
        type: choice
        options:
          - haex-pass
          - haex-files
          - haex-calendar
          - haex-code
      version:
        description: 'Version (without v prefix, e.g., 1.4.13)'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout manifest
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            apps/${{ inputs.extension }}/haextension/manifest.json

      - name: Download bundle from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXT_NAME: ${{ inputs.extension }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="${EXT_NAME}-v${VERSION}"
          echo "Downloading bundle from release ${TAG}..."
          gh release download "$TAG" --pattern "*.xt" --dir bundle
          ls -la bundle/

      - name: Upload to marketplace
        env:
          MARKETPLACE_API_KEY: ${{ secrets.MARKETPLACE_API_KEY }}
          MARKETPLACE_API: https://marketplace.haex.space
          EXT_NAME: ${{ inputs.extension }}
          VERSION: ${{ inputs.version }}
        run: |
          MANIFEST_PATH="apps/${EXT_NAME}/haextension/manifest.json"
          BUNDLE_FILE=$(find bundle -name "*.xt" -type f | head -1)

          echo "Uploading ${EXT_NAME} v${VERSION} to marketplace..."

          HTTP_CODE=$(curl -s -o /tmp/marketplace-response.txt -w "%{http_code}" \
            -X POST "${MARKETPLACE_API}/publish/extensions/${EXT_NAME}/bundle" \
            -H "Authorization: Bearer ${MARKETPLACE_API_KEY}" \
            -F "bundle=@${BUNDLE_FILE}" \
            -F "version=${VERSION}" \
            -F "manifest=<${MANIFEST_PATH}")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "Successfully uploaded to marketplace"
          else
            echo "Marketplace upload failed with HTTP $HTTP_CODE:"
            cat /tmp/marketplace-response.txt
            exit 1
          fi
